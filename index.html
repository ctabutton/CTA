<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Odyssey Retreat – Call Us</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Cinzel:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --green-deep: #1a2e1a;
      --gold: #c9a84c;
      --cream: #f5f0e8;
    }

    html, body {
      height: 100%;
      background: var(--green-deep);
      color: var(--cream);
      font-family: 'Cormorant Garamond', serif;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 80%, rgba(74,124,74,0.2) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(201,168,76,0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .leaves {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .leaf {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50% 0 50% 0;
      background: rgba(74,124,74,0.4);
      animation: drift linear infinite;
    }

    .leaf:nth-child(1) { left: 10%; animation-duration: 12s; animation-delay: 0s;  width: 5px; height: 5px; }
    .leaf:nth-child(2) { left: 25%; animation-duration: 15s; animation-delay: 2s;  background: rgba(201,168,76,0.3); }
    .leaf:nth-child(3) { left: 40%; animation-duration: 10s; animation-delay: 4s; }
    .leaf:nth-child(4) { left: 60%; animation-duration: 14s; animation-delay: 1s;  width: 3px; height: 3px; background: rgba(201,168,76,0.25); }
    .leaf:nth-child(5) { left: 75%; animation-duration: 11s; animation-delay: 6s; }
    .leaf:nth-child(6) { left: 88%; animation-duration: 13s; animation-delay: 3s;  background: rgba(201,168,76,0.3); }
    .leaf:nth-child(7) { left: 50%; animation-duration: 16s; animation-delay: 5s;  width: 3px; height: 3px; }
    .leaf:nth-child(8) { left: 33%; animation-duration: 9s;  animation-delay: 7s;  background: rgba(201,168,76,0.2); }

    @keyframes drift {
      0%   { transform: translateY(-20px) rotate(0deg);   opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
    }

    .container {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .ornament {
      font-size: 1.2rem;
      color: var(--gold);
      letter-spacing: 0.5rem;
      margin-bottom: 1.2rem;
      opacity: 0;
      animation: fadeUp 1s ease forwards 0.2s;
    }

    .title {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.6rem, 6vw, 2.8rem);
      font-weight: 400;
      color: var(--cream);
      letter-spacing: 0.15em;
      line-height: 1.3;
      opacity: 0;
      animation: fadeUp 1s ease forwards 0.4s;
    }

    .title span { color: var(--gold); }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin: 1.4rem 0;
      opacity: 0;
      animation: fadeUp 1s ease forwards 0.6s;
    }

    .divider::before,
    .divider::after {
      content: '';
      width: 60px;
      height: 1px;
    }

    .divider::before { background: linear-gradient(to right, transparent, var(--gold)); }
    .divider::after  { background: linear-gradient(to left,  transparent, var(--gold)); }

    .divider-icon { color: var(--gold); font-size: 0.7rem; }

    .tagline {
      font-style: italic;
      font-size: clamp(1rem, 3.5vw, 1.3rem);
      color: rgba(245,240,232,0.7);
      font-weight: 300;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 1s ease forwards 0.8s;
    }

    .call-btn {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      background: linear-gradient(135deg, var(--gold) 0%, #a8782a 100%);
      color: var(--green-deep);
      border-radius: 4px;
      padding: 1.2rem 2.8rem;
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: fadeUp 1s ease forwards 1s, pulse 3s ease-in-out infinite 2s;
      box-shadow: 0 8px 32px rgba(201,168,76,0.3);
      transition: transform 0.15s ease;
    }

    .call-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 50%);
      pointer-events: none;
    }

    .call-btn:active { transform: scale(0.97); }

    .call-btn-label {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 0.3rem;
      opacity: 0.8;
    }

    .call-btn-number {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.3rem, 5vw, 1.8rem);
      font-weight: 400;
      letter-spacing: 0.08em;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 8px 32px rgba(201,168,76,0.3); }
      50%       { box-shadow: 0 8px 48px rgba(201,168,76,0.6); }
    }



    .footer-text {
      position: absolute;
      bottom: 2rem;
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      color: rgba(245,240,232,0.2);
      font-family: 'Cinzel', serif;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 1s ease forwards 1.4s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="leaves">
    <div class="leaf"></div><div class="leaf"></div><div class="leaf"></div>
    <div class="leaf"></div><div class="leaf"></div><div class="leaf"></div>
    <div class="leaf"></div><div class="leaf"></div>
  </div>

  <div class="container">
    <div class="ornament">✦ ✦ ✦</div>

    <h1 class="title">The Odyssey<br><span>Retreat</span></h1>

    <div class="divider"><span class="divider-icon">✦</span></div>

    <p class="tagline">To book or enquire, call us on</p>

    <a class="call-btn" href="tel:+917065002340">
      <span class="call-btn-label">📞 Tap to Call</span>
      <span class="call-btn-number">+91 70650 02340</span>
    </a>

    <p class="footer-text">Rejoice &amp; Reboot</p>
  </div>

</body>
</html>
